name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests (OTP ${{ matrix.otp }} | Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: test
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      matrix:
        include:
          - elixir: 1.15.8
            otp: 25.3.2.9
          - elixir: 1.18.4
            otp: 27.3
          - elixir: 1.18.4
            otp: 28.0.1

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Elixir
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore dependencies cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}

      - name: Install dependencies
        run: mix deps.get

      - name: Run tests and post coverage to Coveralls
        run: mix coveralls.github

  e2e-tests:
    name: E2E tests (OTP ${{ matrix.otp }} | Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - elixir: 1.15.8
            otp: 25.3.2.9
          - elixir: 1.18.4
            otp: 27.3
          - elixir: 1.18.4
            otp: 28.0.1

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Elixir
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore E2E dependencies cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            e2e/deps
            e2e/_build
          key: deps-e2e-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('e2e/mix.lock') }}
          restore-keys: |
            deps-e2e-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}

      - name: Install E2E dependencies
        working-directory: e2e
        run: mix deps.get
        env:
          MIX_ENV: test

      - name: Setup database
        working-directory: e2e
        run: mix ecto.setup
        env:
          MIX_ENV: test

      - name: Run E2E tests
        working-directory: e2e
        run: mix test
        env:
          MIX_ENV: test

  installer-tests:
    name: Installer tests (OTP ${{ matrix.otp }} | Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - elixir: 1.15.8
            otp: 25.3.2.9
          - elixir: 1.18.4
            otp: 27.3
          - elixir: 1.18.4
            otp: 28.0.1

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Elixir
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore installer dependencies cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            installer/deps
            installer/_build
          key: deps-installer-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('installer/mix.lock') }}
          restore-keys: |
            deps-installer-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}

      - name: Install installer dependencies
        working-directory: installer
        run: mix deps.get

      - name: Run installer tests
        working-directory: installer
        run: mix test

  integration-tests:
    name: Integration tests (OTP ${{ matrix.otp }} | Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - elixir: 1.15.8
            otp: 25.3.2.9
          - elixir: 1.17.3
            otp: 27.1.2

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Elixir
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore integration test dependencies cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            integration_test/deps
            integration_test/_build
          key: deps-integration-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('integration_test/mix.lock') }}
          restore-keys: |
            deps-integration-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}

      - name: Install integration test dependencies
        working-directory: integration_test
        run: mix deps.get

      - name: Run integration tests
        working-directory: integration_test
        run: mix test --exclude database:mysql --exclude database:mssql --timeout 600000
