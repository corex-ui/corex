name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Elixir
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4
        with:
          elixir-version: "1.18.4"
          otp-version: "27.3"

      - name: Restore Corex dependencies cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-27.3-1.18.4-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-27.3-1.18.4

      - name: Install Corex dependencies
        run: mix deps.get
        env:
          MIX_ENV: test

      - name: Elixir — Corex
        run: mix lint
        env:
          MIX_ENV: test

      - name: Elixir — build docs
        run: mix docs
        env:
          MIX_ENV: docs

      - name: Restore E2E dependencies cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            e2e/deps
            e2e/_build
          key: deps-e2e-${{ runner.os }}-27.3-1.18.4-${{ hashFiles('e2e/mix.lock') }}
          restore-keys: |
            deps-e2e-${{ runner.os }}-27.3-1.18.4

      - name: Install E2E dependencies
        working-directory: e2e
        run: mix deps.get
        env:
          MIX_ENV: test

      - name: Elixir — E2E
        working-directory: e2e
        run: mix lint
        env:
          MIX_ENV: test

      - name: Install installer dependencies
        working-directory: installer
        run: mix deps.get
        env:
          MIX_ENV: test

      - name: Elixir — installer
        working-directory: installer
        run: mix lint
        env:
          MIX_ENV: test

      - name: Install integration test dependencies
        working-directory: integration_test
        run: mix deps.get
        env:
          MIX_ENV: test

      - name: Elixir — integration test
        working-directory: integration_test
        run: mix lint
        env:
          MIX_ENV: test

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript — typecheck
        run: pnpm run typecheck

      - name: TypeScript — format
        run: pnpm run format:check

      - name: TypeScript — ESLint
        run: pnpm run lint

      - name: TypeScript — component declarations
        run: pnpm run gen:components-dts:check

  hooks:
    name: Hooks
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Vitest — hooks and components
        run: pnpm test

  unit-tests:
    name: Unit tests (OTP ${{ matrix.otp }} | Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: test
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      matrix:
        include:
          - elixir: 1.17.3
            otp: 26.2.5.2
            coveralls: false
          - elixir: 1.18.4
            otp: 27.3
            coveralls: true
          - elixir: 1.18.4
            otp: 28.0.1
            coveralls: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Elixir
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore dependencies cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            deps
            _build
          key: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}

      - name: Install dependencies
        run: mix deps.get

      - name: Verify version alignment
        if: matrix.coveralls
        run: |
          COREX_V=$(grep '@version' mix.exs | head -1 | sed -n 's/.*"\([^"]*\)".*/\1/p')
          PKG_V=$(sed -n 's/.*"version": "\([^"]*\)".*/\1/p' package.json | head -1)
          INST_V=$(grep '@version' installer/mix.exs | head -1 | sed -n 's/.*"\([^"]*\)".*/\1/p')
          test "$COREX_V" = "$PKG_V" && test "$COREX_V" = "$INST_V"

      - name: Set up pnpm
        if: matrix.coveralls
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.0

      - name: Set up Node.js
        if: matrix.coveralls
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JavaScript dependencies
        if: matrix.coveralls
        run: pnpm install --frozen-lockfile

      - name: Run tests and post coverage to Coveralls
        if: matrix.coveralls
        run: mix coveralls.github

      - name: Run tests
        if: ${{ !matrix.coveralls }}
        run: mix test

  e2e-tests:
    name: E2E tests (OTP ${{ matrix.otp }} | Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - elixir: 1.18.4
            otp: 27.3
          - elixir: 1.18.4
            otp: 28.0.1

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: e2e_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: e2e/pnpm-lock.yaml

      - name: Install e2e JS dependencies
        working-directory: e2e
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Set up Elixir
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore E2E dependencies cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            e2e/deps
            e2e/_build
          key: deps-e2e-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('e2e/mix.lock') }}
          restore-keys: |
            deps-e2e-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}

      - name: Install E2E dependencies
        working-directory: e2e
        run: mix deps.get
        env:
          MIX_ENV: test

      - name: Setup database
        working-directory: e2e
        run: mix ecto.setup
        env:
          MIX_ENV: test

      - name: Run E2E tests
        working-directory: e2e
        run: mix test --timeout 600000
        env:
          MIX_ENV: test

  installer-tests:
    name: Installer tests (OTP ${{ matrix.otp }} | Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: test

    strategy:
      matrix:
        include:
          - elixir: 1.18.4
            otp: 27.3
          - elixir: 1.18.4
            otp: 28.0.1

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Elixir
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore installer dependencies cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            installer/deps
            installer/_build
          key: deps-installer-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('installer/mix.lock', 'installer/mix.exs') }}-test-support
          restore-keys: |
            deps-installer-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}

      - name: Install installer dependencies
        working-directory: installer
        run: mix deps.get

      - name: Install phx_new archive for installer coverage
        run: mix archive.install hex phx_new --force

      - name: Run installer tests with coverage
        working-directory: installer
        run: |
          mix compile --force
          mix test --cover --exclude integration

      - name: Run installer integration tests
        working-directory: installer
        run: |
          mix compile --force
          mix test --only integration

      - name: Verify corex_new archive builds
        working-directory: installer
        env:
          MIX_ENV: prod
        run: |
          mix compile --no-deps-check
          mix archive.build -o /tmp/corex_new_archive_check.ez
          test -s /tmp/corex_new_archive_check.ez

  integration-tests:
    name: Integration tests (OTP ${{ matrix.otp }} | Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        include:
          - elixir: 1.18.4
            otp: 27.3
          - elixir: 1.18.4
            otp: 28.0.1

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Elixir
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Restore integration test dependencies cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: |
            integration_test/deps
            integration_test/_build
          key: deps-integration-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('integration_test/mix.lock') }}
          restore-keys: |
            deps-integration-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}

      - name: Install integration test dependencies
        working-directory: integration_test
        run: mix deps.get

      - name: Install installer dependencies and local corex_new archive
        working-directory: installer
        env:
          MIX_ENV: test
        run: |
          mix deps.get
          mix compile --force
          mix archive.build -o corex_new.ez
          mix archive.install corex_new.ez --force

      - name: Install Mix archives for corex.new (phx_new)
        run: mix archive.install hex phx_new --force

      - name: Run integration tests (fast)
        working-directory: integration_test
        env:
          MIX_ENV: test
        run: mix test --timeout 1200000

      - name: Run integration tests (database)
        working-directory: integration_test
        env:
          MIX_ENV: test
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGPORT: "5432"
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: mix test --include database --timeout 1200000
